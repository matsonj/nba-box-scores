name: Hourly Live Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-season:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.season-check.outputs.active }}
      season_year: ${{ steps.season-check.outputs.season_year }}
    steps:
      - name: Check if NBA season is active and compute season year
        id: season-check
        run: |
          month=$(date -u +%-m)
          year=$(date -u +%Y)
          # NBA season runs October (10) through June (6)
          # Skip July (7), August (8), September (9)
          if [ "$month" -ge 7 ] && [ "$month" -le 9 ]; then
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "Off-season (month $month), skipping."
          else
            echo "active=true" >> "$GITHUB_OUTPUT"
            # Season year: Oct-Dec = current year, Jan-Jun = prior year
            if [ "$month" -ge 10 ]; then
              season_year=$year
            else
              season_year=$((year - 1))
            fi
            echo "season_year=$season_year" >> "$GITHUB_OUTPUT"
            echo "NBA season active (month $month), season year $season_year."
          fi

  ingest:
    needs: check-season
    if: needs.check-season.outputs.active == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Run current season ingestion
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: npm run ingest -- --season ${{ needs.check-season.outputs.season_year }} --delay 500
